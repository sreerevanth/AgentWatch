name: 🐛 Bug Report
description: Report a bug to help improve AgentWatch
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the problem...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Detail the steps required to reproduce the bug.
      placeholder: |
        1. Install agentwatch...
        2. Run agent with...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen.
      placeholder: What should happen...
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: e.g. 3.12.3
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Output
      description: Please copy and paste any stack traces or logs.
      render: shell
