name: CI Lint & Typecheck

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'agentwatch/**'
      - 'tests/**'
      - 'pyproject.toml'
  push:
    branches:
      - main
      - master

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run Ruff Linter
        run: ruff check agentwatch tests

      - name: Run Ruff Formatter Check
        run: ruff format --check agentwatch tests

      - name: Run Mypy Type Checker
        run: mypy agentwatch tests
