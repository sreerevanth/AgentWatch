name: AgentWatch CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Python lint + type-check ─────────────────────────────────────────────
  python-lint:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install ruff mypy pydantic
      - name: Ruff lint
        run: ruff check agentwatch/
      - name: Ruff format check
        run: ruff format --check agentwatch/

  # ─── Python unit tests ────────────────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentwatch_test
          POSTGRES_USER: agentwatch
          POSTGRES_PASSWORD: agentwatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql+asyncpg://agentwatch:agentwatch@localhost:5432/agentwatch_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/ -v --cov=agentwatch --cov-report=xml --cov-report=html --cov-report=term-missing --cov-fail-under=70
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report
          path: htmlcov/
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─── Integration tests ────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [python-tests]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentwatch_test
          POSTGRES_USER: agentwatch
          POSTGRES_PASSWORD: agentwatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://agentwatch:agentwatch@localhost:5432/agentwatch_test
          REDIS_URL: redis://localhost:6379/0
        run: pytest tests/integration/ -v

  # ─── Frontend build ───────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_API_URL: /api/v1

  # ─── Landing build ────────────────────────────────────────────────────────
  # agentwatch-landing had no CI coverage at all: it is a full Next.js application with its own
  # lockfile, and nothing installed it, built it or type-checked it. A dependency break or a type
  # error landed silently and the first person to find out was whoever deployed. `frontend` has had
  # a build job all along; the asymmetry looked accidental rather than deliberate.
  landing-build:
    name: Landing Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agentwatch-landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: agentwatch-landing/package-lock.json
      - name: Install deps
        run: npm ci
      # No separate type-check step: unlike `frontend`, the landing app declares no `type-check`
      # script — and it doesn't need one. Its next.config sets no `ignoreBuildErrors`, so
      # `next build` type-checks as part of the build and fails on a type error by itself.
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ─── Docker build ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [python-tests, frontend-build]
    # Previously gated to `push` on `main`, which meant the images were only ever built *after* a
    # change had already merged. A pull request touching Dockerfile.api got no Docker build at all,
    # so a broken Dockerfile could only be discovered on main — by which point it's everyone's
    # problem. Running it on pull requests as well makes it a gate rather than a post-mortem.
    #
    # The cost is modest: both builds already use the GitHub Actions layer cache (`cache-from:
    # type=gha`), so unchanged layers are pulled rather than rebuilt.
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: false
          tags: agentwatch/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: false
          tags: agentwatch/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security scan ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install pip-audit
        run: |
          pip install -e ".[crypto]"
          pip install pip-audit
      - name: Audit dependencies
        run: pip-audit --desc
        continue-on-error: true
