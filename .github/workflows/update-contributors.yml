name: Update Contributors Wall

on:
  push:
    branches: [main]
  schedule:
    # Daily at midnight UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

# Allow the workflow to push the regenerated contributors.json back to main.
permissions:
  contents: write

# Avoid overlapping runs racing on the same commit.
concurrency:
  group: update-contributors
  cancel-in-progress: false

jobs:
  update-contributors:
    name: Refresh contributors.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate contributors.json
        id: generate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          repo = os.environ["REPO"]
          token = os.environ.get("GITHUB_TOKEN", "")
          out_path = Path("agentwatch-landing/public/contributors.json")

          # ── 1. Fetch all contributors (paginated) ────────────────────────
          headers = {
              "User-Agent": "agentwatch-contributors-bot",
              "Accept": "application/vnd.github+json",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          raw = []
          page = 1
          while True:
              url = (
                  f"https://api.github.com/repos/{repo}/contributors"
                  f"?per_page=100&page={page}"
              )
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  batch = json.load(resp)
              if not batch:
                  break
              raw.extend(batch)
              if len(batch) < 100:
                  break
              page += 1

          # ── 2. Filter bots (login contains "[bot]") and sort desc ────────
          contributors = sorted(
              (
                  {
                      "login": c["login"],
                      "avatar_url": f"https://github.com/{c['login']}.png",
                      "html_url": f"https://github.com/{c['login']}",
                      "contributions": c["contributions"],
                  }
                  for c in raw
                  if "[bot]" not in c.get("login", "")
              ),
              key=lambda c: c["contributions"],
              reverse=True,
          )

          # ── 3. Skip the write if the contributor data is unchanged ───────
          # (compare everything except updated_at so we don't churn a commit
          #  every single night when nothing actually changed)
          old_list = None
          if out_path.exists():
              try:
                  old_list = json.loads(out_path.read_text()).get("contributors")
              except (json.JSONDecodeError, OSError):
                  old_list = None

          if old_list == contributors:
              print("Contributors unchanged — nothing to write.")
              print("changed=false", file=open(os.environ["GITHUB_OUTPUT"], "a"))
          else:
              payload = {
                  "contributors": contributors,
                  "updated_at": datetime.now(timezone.utc).strftime(
                      "%Y-%m-%dT%H:%M:%SZ"
                  ),
                  "total": len(contributors),
              }
              out_path.parent.mkdir(parents=True, exist_ok=True)
              out_path.write_text(json.dumps(payload, indent=2) + "\n")
              print(f"Wrote {len(contributors)} contributors.")
              print("changed=true", file=open(os.environ["GITHUB_OUTPUT"], "a"))
          PY

      - name: Commit if changed
        if: steps.generate.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agentwatch-landing/public/contributors.json
          if git diff --staged --quiet; then
            echo "No staged changes — skipping commit."
          else
            git commit -m "chore: update contributors"
            git push
          fi
