name: Publish to PyPI

# Runs ONLY when a version tag is pushed, e.g.:
#   git tag v0.2.1 && git push origin v0.2.1
on:
  push:
    tags:
      - "v*"

# Needed to create the GitHub Release and upload the build artifacts.
permissions:
  contents: write

jobs:
  publish:
    name: Build, verify, publish, release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Verify pyproject.toml version matches tag
        run: |
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          echo "Tag version:        $TAG_VERSION"
          echo "pyproject version:  $PYPROJECT_VERSION"
          if [ "$PYPROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch — tag is v${TAG_VERSION} but pyproject.toml [project].version is ${PYPROJECT_VERSION}. Bump pyproject.toml to ${TAG_VERSION} (or push the correct tag) and try again."
            exit 1
          fi
          echo "✅ Versions match."

      - name: Build distributions
        run: python -m build

      - name: Verify distributions
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          python3 - "${{ steps.version.outputs.version }}" <<'PY'
          import os
          import sys
          from pathlib import Path

          version = sys.argv[1]
          changelog = Path("CHANGELOG.md")
          out = Path("release_notes.md")

          body = ""
          if changelog.exists():
              collected, capture = [], False
              for line in changelog.read_text(encoding="utf-8").splitlines():
                  is_h2 = line.strip().startswith("## ")
                  if is_h2 and version in line:
                      capture = True
                      continue
                  if capture and is_h2:
                      break
                  if capture:
                      collected.append(line)
              body = "\n".join(collected).strip()

          found = "true" if body else "false"
          out.write_text((body if body else f"Release v{version}.") + "\n", encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"found={found}\n")
          print(f"CHANGELOG section found: {found}")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AgentWatch v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          # When no matching CHANGELOG section exists, let GitHub auto-generate
          # notes from merged PRs/commits instead.
          generate_release_notes: ${{ steps.notes.outputs.found != 'true' }}
          files: |
            dist/*.whl
            dist/*.tar.gz
