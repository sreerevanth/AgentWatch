name: PR Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        id: pytest
        continue-on-error: true
        run: |
          pytest tests/ -v --tb=short \
            --cov=agentwatch \
            --cov-report=term-missing \
            --cov-report=json

      - name: Ruff lint
        id: ruff
        continue-on-error: true
        run: ruff check .

      - name: Save PR info and results
        if: always()
        run: |
          mkdir -p pr_results
          echo "${{ github.event.pull_request.number }}" > pr_results/pr_number.txt
          echo "${{ github.event.pull_request.head.sha }}" > pr_results/pr_sha.txt
          echo "${{ steps.pytest.outcome }}" > pr_results/pytest_outcome.txt
          echo "${{ steps.ruff.outcome }}" > pr_results/ruff_outcome.txt
          if [ -f coverage.json ]; then
            cp coverage.json pr_results/coverage.json
          else
            echo "{}" > pr_results/coverage.json
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr_results
          path: pr_results/

      # Tests gate the PR. Lint runs and is reported above but is not a hard
      # blocker (the repo carries pre-existing lint debt outside the package).
      - name: Fail if tests failed
        if: steps.pytest.outcome != 'success'
        run: |
          echo "::error::pytest reported failures — see the test step log above."
          exit 1
