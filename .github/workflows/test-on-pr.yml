name: PR Tests

on:
  pull_request:
    branches: [main]

# 1. Harden token permissions to read-only as flagged by CodeRabbit
permissions:
  contents: read

jobs:
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # 2. Crucial Fix: Include 'crypto' extra so pip-audit can evaluate cryptography
      - name: Install package
        run: pip install -e ".[dev,crypto]"

      - name: Security Vulnerability Audit
        run: |
          pip install pip-audit
          pip-audit

      - name: Run tests with coverage
        id: pytest
        continue-on-error: true
        run: |
          pytest tests/ -v --tb=short \
            --cov=agentwatch \
            --cov-report=term-missing \
            --cov-report=json

      - name: Ruff lint
        id: ruff
        continue-on-error: true
        run: ruff check .

      - name: Save PR info and results
        if: always()
        run: |
          mkdir -p pr_results
          echo "${{ github.event.pull_request.number }}" > pr_results/pr_number.txt
          echo "${{ github.event.pull_request.head.sha }}" > pr_results/pr_sha.txt
          echo "${{ steps.pytest.outcome }}" > pr_results/pytest_outcome.txt
          echo "${{ steps.ruff.outcome }}" > pr_results/ruff_outcome.txt
          if [ -f coverage.json ]; then
            cp coverage.json pr_results/coverage.json
          else
            echo "{}" > pr_results/coverage.json
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr_results
          path: pr_results/

      # 3. Clean syntax: Hard blocker check correctly configured without trailing text
      - name: Fail if tests failed
        if: steps.pytest.outcome != 'success'
        run: |
          echo "::error::pytest reported failures — see the test step log above."
          exit 1