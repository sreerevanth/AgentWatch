name: Docs

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Read-only token, matching the other workflows.
permissions:
  contents: read

jobs:
  build:
    name: Build docs (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # The package itself is installed so mkdocstrings can import
      # agentwatch.cli to generate the API reference.
      - name: Install package and docs dependencies
        run: pip install -e ".[docs]"

      - name: Build documentation (strict)
        run: mkdocs build --strict
