name: PR Test Report

on:
  workflow_run:
    workflows: ["PR Tests"]
    types:
      - completed

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  report:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download results artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: pr_results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: pr_results

      - name: Comment results on PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- agentwatch-pr-tests -->';
            
            let prNumber;
            let prSha;

            const pullRequests = context.payload.workflow_run.pull_requests;
            if (pullRequests && pullRequests.length > 0) {
              prNumber = pullRequests[0].number;
              prSha = context.payload.workflow_run.head_sha;
            } else {
              try {
                prNumber = parseInt(fs.readFileSync('pr_results/pr_number.txt', 'utf8').trim(), 10);
                prSha = fs.readFileSync('pr_results/pr_sha.txt', 'utf8').trim();
              } catch (e) {
                core.setFailed(`Could not determine PR identity: ${e}`);
                return;
              }
            }

            if (!Number.isInteger(prNumber) || !/^[0-9a-f]{40}$/i.test(prSha)) {
              core.setFailed(`Invalid PR identity: number=${prNumber}, sha=${prSha}`);
              return;
            }

            const testOutcome = fs.readFileSync('pr_results/pytest_outcome.txt', 'utf8').trim();
            const ruffOutcome = fs.readFileSync('pr_results/ruff_outcome.txt', 'utf8').trim();
            
            let coverage = 'n/a';
            try {
              const cov = JSON.parse(fs.readFileSync('pr_results/coverage.json', 'utf8'));
              if (cov && cov.totals && cov.totals.percent_covered !== undefined) {
                coverage = `${cov.totals.percent_covered.toFixed(2)}%`;
              }
            } catch (e) {
              core.warning(`Could not read coverage.json: ${e}`);
            }

            const icon = (o) => (o === 'success' ? '✅' : '❌');
            const body = [
              marker,
              '## 🧪 PR Test Results',
              '',
              '| Check | Result |',
              '| --- | --- |',
              `| Tests (\`pytest tests/\`) | ${icon(testOutcome)} ${testOutcome} |`,
              `| Lint (\`ruff check .\`) | ${icon(ruffOutcome)} ${ruffOutcome} |`,
              `| Coverage (\`agentwatch\`) | **${coverage}** |`,
              '',
              `<sub>Python 3.12 · commit ${prSha.substring(0, 7)}</sub>`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = prNumber;
            
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
