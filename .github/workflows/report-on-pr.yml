name: PR Test Report

on:
  workflow_run:
    workflows: ["PR Tests"]
    types:
      - completed

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  report:
    name: Comment on PR
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Download results artifact
        uses: actions/download-artifact@v4
        with:
          name: pr_results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: pr_results

      - name: Comment results on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- agentwatch-pr-tests -->';
            
            const prNumber = parseInt(fs.readFileSync('pr_results/pr_number.txt', 'utf8').trim(), 10);
            const prSha = fs.readFileSync('pr_results/pr_sha.txt', 'utf8').trim();
            const testOutcome = fs.readFileSync('pr_results/pytest_outcome.txt', 'utf8').trim();
            const ruffOutcome = fs.readFileSync('pr_results/ruff_outcome.txt', 'utf8').trim();
            
            let coverage = 'n/a';
            try {
              const cov = JSON.parse(fs.readFileSync('pr_results/coverage.json', 'utf8'));
              if (cov && cov.totals && cov.totals.percent_covered !== undefined) {
                coverage = `${cov.totals.percent_covered.toFixed(2)}%`;
              }
            } catch (e) {
              core.warning(`Could not read coverage.json: ${e}`);
            }

            const icon = (o) => (o === 'success' ? '✅' : '❌');
            const body = [
              marker,
              '## 🧪 PR Test Results',
              '',
              '| Check | Result |',
              '| --- | --- |',
              `| Tests (\`pytest tests/\`) | ${icon(testOutcome)} ${testOutcome} |`,
              `| Lint (\`ruff check .\`) | ${icon(ruffOutcome)} ${ruffOutcome} |`,
              `| Coverage (\`agentwatch\`) | **${coverage}** |`,
              '',
              `<sub>Python 3.12 · commit ${prSha.substring(0, 7)}</sub>`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = prNumber;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
